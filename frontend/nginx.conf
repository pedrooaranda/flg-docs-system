server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Páginas legais estáticas (Meta crawler precisa de HTML real)
  # Servidas tanto em /legal/{page} quanto em /{page} (atalhos root)
  location = /privacy { try_files /privacy.html =404; }
  location = /terms { try_files /terms.html =404; }
  location = /data-deletion { try_files /data-deletion.html =404; }

  location /legal/ {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # SPA fallback — todas as rotas servem o index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache para assets estáticos
  location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
