name: FLG — Diag DB (one-shot)

# Workflow one-shot pra investigar estado do DB via docker exec no backend.
# Roda Python dentro do container pra contar rows em tabelas críticas.

on:
  workflow_dispatch:

jobs:
  diag:
    name: Count rows
    runs-on: ubuntu-latest
    steps:
      - name: SSH + docker exec
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASS }}
          command_timeout: 2m
          script: |
            cd /opt/flg-jornada
            docker compose exec -T backend python3 -c "
            from config import settings
            from supabase import create_client
            c = create_client(settings.supabase_url, settings.supabase_key)
            for table in ['clientes', 'encontros_base', 'agentes_config', 'encontros_pratica', 'colaboradores']:
                try:
                    r = c.table(table).select('id', count='exact').limit(1).execute()
                    n = getattr(r, 'count', None)
                    print(f'{table}: count={n}, sample={len(r.data or [])} row(s)')
                except Exception as e:
                    print(f'{table}: ERRO {e}')
            print('---')
            # Lista 3 clientes pra ver se existem mesmo
            try:
                r = c.table('clientes').select('id, nome, consultor_responsavel, status').limit(5).execute()
                print(f'Sample clientes: {len(r.data or [])} rows')
                for row in (r.data or [])[:5]:
                    print(f'  - {row.get(\"nome\")} ({row.get(\"consultor_responsavel\")}) status={row.get(\"status\")}')
            except Exception as e:
                print(f'Sample erro: {e}')
            "
