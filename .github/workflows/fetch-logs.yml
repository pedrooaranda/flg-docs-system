name: FLG — Fetch backend logs (debug)

# Workflow on-demand pra puxar logs do container backend.
# Útil pra investigar callbacks de OAuth, sync errors, etc.
# Não roda automaticamente — só via gh workflow run.

on:
  workflow_dispatch:
    inputs:
      grep:
        description: 'Padrão grep (ex: "OAuth|callback|cliente_id"). Vazio = últimas N linhas.'
        type: string
        default: ''
      lines:
        description: 'Linhas a puxar (sem grep) ou contexto após match'
        type: string
        default: '300'

jobs:
  logs:
    name: Pull backend logs
    runs-on: ubuntu-latest
    steps:
      - name: SSH + docker compose logs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASS }}
          command_timeout: 2m
          script: |
            cd /opt/flg-jornada
            if [ -n "${{ inputs.grep }}" ]; then
              echo "=== Backend logs grep '${{ inputs.grep }}' (últimas 2000 linhas) ==="
              docker compose logs backend --tail=2000 2>&1 | grep -iE "${{ inputs.grep }}" | tail -n ${{ inputs.lines }}
            else
              echo "=== Backend logs (últimas ${{ inputs.lines }} linhas) ==="
              docker compose logs backend --tail=${{ inputs.lines }} 2>&1
            fi
